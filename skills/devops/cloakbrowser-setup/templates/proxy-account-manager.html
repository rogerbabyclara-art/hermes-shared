<!--
  AdsPower-style multi-account manager table skeleton.
  Copy into renderer/index.html under a sub-tab pane.
  Companion JS pattern: see references/adspower-style-account-manager-ui.md
  Companion CSS classes used here: ad-status, ad-chip, ad-ip-link, ad-inline-edit,
  proxy-row-sel, proxy-row-running, proxy-row-locked, proxy-batch-bar, proxy-search,
  proxy-filter-chk, proxy-batch-info. Define these in style.css to match dark theme.
-->

<div id="proxy-pane-accounts" class="proxy-pane active">

  <!-- TOP BAR: main actions + search + quick filter -->
  <div class="proxy-top-bar">
    <button id="proxy-btn-reload" class="az-action-btn compact">🔄 刷新</button>
    <button id="proxy-btn-batch-create" class="az-action-btn compact green">📦 批量建账号</button>
    <button id="proxy-btn-add-single" class="az-action-btn compact">+ 单加</button>
    <input id="proxy-acc-search" class="proxy-search"
           placeholder="搜索: 编号 / 名称 / 标签 / 备注 / IP / 地区" />
    <label class="proxy-filter-chk">
      <input type="checkbox" id="proxy-flt-running" /> 仅看已打开
    </label>
    <span class="proxy-stats" id="proxy-stats">—</span>
  </div>

  <!-- BATCH BAR: appears when selected.size > 0 (toggle .hidden) -->
  <div id="proxy-batch-bar" class="proxy-batch-bar hidden">
    <span class="proxy-batch-info">已选 <b id="proxy-sel-n">0</b> 个</span>
    <button id="proxy-batch-open" class="az-action-btn compact green">▶ 批量打开</button>
    <button id="proxy-batch-close" class="az-action-btn compact">⏹ 批量关闭</button>
    <button id="proxy-batch-tag" class="az-action-btn compact">🏷 加标签</button>
    <button id="proxy-batch-untag" class="az-action-btn compact">✂ 去标签</button>
    <button id="proxy-batch-note" class="az-action-btn compact">📝 改备注</button>
    <button id="proxy-batch-delete" class="az-action-btn compact red">🗑 批量删</button>
    <button id="proxy-batch-clear" class="az-action-btn compact ghost">✕ 取消选择</button>
  </div>

  <!-- TABLE -->
  <div class="proxy-table-wrap">
    <table class="proxy-table proxy-acc-table-v2" id="proxy-acc-table">
      <thead>
        <tr>
          <th style="width:36px"><input type="checkbox" id="proxy-sel-all" /></th>
          <th style="width:54px">编号</th>
          <th style="width:120px">名称</th>
          <th style="width:80px">状态</th>
          <th style="width:170px">IP · 地区</th>
          <th style="width:200px">标签</th>
          <th>备注</th>
          <th style="width:100px">上次打开</th>
          <th style="width:200px;text-align:right">操作</th>
        </tr>
      </thead>
      <tbody id="proxy-acc-tbody">
        <!-- Renderer fills this. Empty-state row template: -->
        <tr><td colspan="9" class="proxy-empty">
          还没有账号 → 先去 [IP 池] 导入代理, 然后回来 [📦 批量建账号]
        </td></tr>
      </tbody>
    </table>
  </div>
</div>
