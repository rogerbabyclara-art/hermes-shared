# Tinyproxy upstream-chain config
# Use case: residential proxy (cliproxy/IPRoyal/Bright Data) blocks your home/datacenter IP.
# Install on a clean VPS, chain to the residential proxy, expose with BasicAuth.
#
# Install: sudo apt-get install -y tinyproxy   (Ubuntu 22.04+, Debian 12+)
# Place at: /etc/tinyproxy/tinyproxy.conf
# Restart:  sudo systemctl restart tinyproxy
# Logs:     sudo journalctl -u tinyproxy -f   OR   tail -f /var/log/tinyproxy/tinyproxy.log
#
# Chain: client → vps:9999 (BasicAuth) → cliproxy:3010 → residential exit IP

User tinyproxy
Group tinyproxy
Port 9999
Timeout 600
DefaultErrorFile "/usr/share/tinyproxy/default.html"
StatFile "/usr/share/tinyproxy/stats.html"
LogFile "/var/log/tinyproxy/tinyproxy.log"
LogLevel Info
PidFile "/run/tinyproxy/tinyproxy.pid"
MaxClients 100

# Listen on all interfaces (cloud security group / firewall gates real access)
Listen 0.0.0.0

# Client-side BasicAuth — REPLACE with strong creds
BasicAuth CHANGE_ME_USER CHANGE_ME_STRONG_PASS

# Upstream residential proxy — REPLACE host/port and embed user:pass in URL
# Format: Upstream http user:pass@host:port
Upstream http UPSTREAM_USER:UPSTREAM_PASS@upstream.proxy.com:3010

# Allow any source — BasicAuth is the real gate
# (Tighten to specific source IPs in production)
Allow 0.0.0.0/0

# Hide tinyproxy fingerprint
DisableViaHeader Yes
